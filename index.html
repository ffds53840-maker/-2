<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лыся - Главная</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="header">
        <div class="logo">
            <i class="fas fa-bolt logo-icon"></i>
            <span>Лыся</span>
        </div>
        <div class="header-icons">
            <i class="fas fa-search" onclick="toggleSearch()"></i>
            <i class="fas fa-comment-dots" onclick="window.location.href='chat.html'"></i>
            <i class="fas fa-sign-out-alt" onclick="logout()"></i>
        </div>
    </div>

    <!-- Поиск -->
    <div id="searchContainer" class="search-container" style="display: none;">
        <input type="text" id="searchInput" placeholder="Поиск пользователей по имени или нику..." class="search-input" oninput="searchUsers()">
        <div id="searchResults" class="search-results"></div>
    </div>

    <!-- Фильтр по хештегам -->
    <div class="hashtag-filter">
        <input type="text" id="hashtagInput" placeholder="Введите #хештег для поиска" class="hashtag-input">
        <button onclick="filterByHashtag()" class="hashtag-btn">
            <i class="fas fa-search"></i> Найти
        </button>
    </div>

    <div id="posts-container" class="posts-container">
        <div class="loading">Загрузка...</div>
    </div>

    <div class="bottom-nav">
        <i class="fas fa-home active" onclick="window.location.href='index.html'"></i>
        <i class="fas fa-bolt" onclick="window.location.href='channels.html'"></i>
        <i class="fas fa-plus-circle" onclick="openCreatePost()"></i>
        <i class="fas fa-comment" onclick="window.location.href='chat.html'"></i>
        <i class="fas fa-user" onclick="window.location.href='profile.html'"></i>
    </div>

    <!-- Модальное окно создания поста -->
    <div id="createPostModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Создать пост ⚡️</h3>
                <i class="fas fa-times close-modal"></i>
            </div>
            <input type="text" id="postTitle" placeholder="Заголовок" class="modal-input">
            <textarea id="postContent" placeholder="Описание... #хештеги" rows="4" class="modal-textarea"></textarea>
            <div class="media-preview" id="mediaPreview"></div>
            <input type="file" id="postMedia" accept="image/*,video/*" onchange="previewMedia(this)" class="modal-file">
            <button onclick="createPost()" class="publish-btn">
                <i class="fas fa-bolt"></i> Опубликовать
            </button>
        </div>
    </div>

    <!-- Модальное окно комментариев -->
    <div id="commentsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Комментарии</h3>
                <i class="fas fa-times close-modal"></i>
            </div>
            <div id="commentsContainer" class="comments-section"></div>
            <div class="add-comment">
                <input type="text" id="commentText" placeholder="Напишите комментарий..." class="comment-input">
                <button onclick="addComment()" class="comment-btn">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
